version: "3.1"

nlu:
  - intent: greet
    examples: |
      - привет
      - приветики
      - здравствуйте
      - добрый день
      - хай
      - hello
      - hi
      - доброе утро
      - добрый вечер
      - приветствую
      - салют
      - здрасьте
      - доброго времени суток
      - hey
      - greetings

  - intent: goodbye
    examples: |
      - пока
      - до свидания
      - всего хорошего
      - bye
      - до встречи
      - прощай
      - увидимся
      - до завтра
      - спокойной ночи

  - intent: ask_architecture
    examples: |
      - Расскажите об архитектуре ПО
      - Какие подходы существуют в архитектуре?
      - Что такое микросервисная архитектура?
      - Как выбрать архитектуру ПО?

  - intent: affirm
    examples: |
      - Да
      - Верно
      - Именно

  - intent: deny
    examples: |
      - Нет
      - Не нужно
      - Неверно

  - intent: request_info
    examples: |
      - Расскажите больше об этом
      - Можете уточнить?
      - Какие есть детали?
